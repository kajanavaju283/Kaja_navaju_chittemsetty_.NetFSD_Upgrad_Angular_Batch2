<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List - Add to Cart</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; }
        
        /* Cart Header Style */
        .cart-header { background: #343a40; color: white; padding: 15px; text-align: right; border-radius: 5px; margin-bottom: 30px; }
        #cart-count { background: #ffc107; color: #000; padding: 2px 10px; border-radius: 50%; font-weight: bold; margin-left: 5px; }

        /* Product Grid */
        .product-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        .product-card { background: white; border: 1px solid #ddd; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .product-card h3 { margin: 10px 0; color: #333; }
        .product-card p { color: #28a745; font-weight: bold; font-size: 1.2em; }

        /* Button Style */
        .add-to-cart-btn { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; transition: background 0.2s; }
        .add-to-cart-btn:hover { background-color: #0056b3; }
        .add-to-cart-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="cart-header">
        <strong>Shopping Cart: </strong> <span id="cart-count">0</span>
    </div>

    <h2>Available Products</h2>

    <div class="product-list">
        <div class="product-card">
            <h3>Wireless Headphones</h3>
            <p>$49.99</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <h3>Smart Watch</h3>
            <p>$129.00</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <h3>Gaming Mouse</h3>
            <p>$25.50</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <h3>Mechanical Keyboard</h3>
            <p>$85.00</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            // Initialize counter variable
            let count = 0;

            // jQuery click event for "Add to Cart" buttons
            $('.add-to-cart-btn').click(function() {
                // Increment the counter
                count++;

                // Requirement: Update the cart counter at the top dynamically
                $('#cart-count').text(count);

                // Optional: Simple feedback to show item was added
                console.log("Item added to cart. Total items: " + count);
            });
        });
    </script>

</body>
</html>
