<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Form</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-container { max-width: 400px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        #message { margin-top: 15px; font-weight: bold; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Student Feedback</h2>
        <form id="feedbackForm">
            <div class="field">
                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>

            <div class="field">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="field">
                <label for="rating">Course Rating:</label>
                <select id="rating">
                    <option value="5">5 - Excellent</option>
                    <option value="4">4 - Very Good</option>
                    <option value="3">3 - Good</option>
                    <option value="2">2 - Fair</option>
                    <option value="1">1 - Poor</option>
                </select>
            </div>

            <div class="field">
                <label for="comments">Comments:</label>
                <textarea id="comments" rows="4"></textarea>
            </div>

            <button type="button" id="submitBtn">Submit Feedback</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        $(document).ready(function() {
            // Click event for the Submit button
            $('#submitBtn').click(function() {
                // Using jQuery selectors to capture inputs
                let name = $('#name').val().trim();
                let email = $('#email').val().trim();
                let messageDiv = $('#message');

                // Validation using jQuery logic
                if (name === "" || email === "") {
                    messageDiv.text("Error: Name and Email cannot be empty!").addClass('error').removeClass('success');
                } else {
                    // Success Message using DOM manipulation
                    messageDiv.text("Thank you for your feedback, " + name + "!").addClass('success').removeClass('error');
                    
                    // Clearing the form fields after successful submission
                    $('#feedbackForm')[0].reset(); 
                }
            });
        });
    </script>

</body>
</html>
