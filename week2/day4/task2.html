<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-3 p-md-5">

    <div class="container bg-white p-4 shadow rounded" style="max-width: 800px;">
        <h2 class="text-center mb-4">Contact Us</h2>
        
        <form class="needs-validation" novalidate>
            
            <div class="row g-3">
                
                <div class="col-md-6">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your name" required>
                    <div class="invalid-feedback">Please provide your name.</div>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    <div class="invalid-feedback">Please provide a valid email.</div>
                </div>

                <div class="col-md-6">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" placeholder="e.g. +91 9876543210" required>
                </div>

                <div class="col-md-6">
                    <label for="subject" class="form-label">Subject</label>
                    <input type="text" class="form-control" id="subject" placeholder="Inquiry topic" required>
                </div>

                <div class="col-12">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-control" id="message" rows="4" placeholder="How can we help you?" required></textarea>
                </div>

                <div class="col-12 mt-4 d-flex gap-2">
                    <button class="btn btn-primary px-4" type="submit">Submit</button>
                    <button class="btn btn-secondary px-4" type="reset">Reset</button>
                </div>

            </div>
        </form>
    </div>

    <script>
        (() => {
          'use strict'
          const forms = document.querySelectorAll('.needs-validation')
          Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
              if (!form.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
              }
              form.classList.add('was-validated')
            }, false)
          })
        })()
    </script>

</body>
</html>
